name: Generate m3u8 Files

on:
  push:
    paths:
      - "channels.json"
      - "generate.py"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # IMPORTANT: Needed for full history and pushing

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run Generator Script
        run: python generate.py

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch and Reset to Origin/Main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Commit Each New m3u8 File Individually
        run: |
          changed=false
          for file in *.m3u8; do
            git add "$file"
            git diff --cached --quiet "$file" || (
              git commit -m "$file"
              changed=true
            )
          done
          if [ "$changed" = true ]; then
            git push origin main
          else
            echo "No .m3u8 files changed."
          fi

name: Generate m3u8 Files

on:
  push:
    paths:
      - "channels.json"
      - "generate.py"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with remote to avoid push rejection
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Run generator
        run: python generate.py

      - name: Commit and Push new m3u8 files
        run: |
          git add *.m3u8
          if git diff --cached --quiet; then
            echo "No .m3u8 file changes to commit"
          else
            for file in *.m3u8; do
              if git diff --cached --quiet "$file"; then continue; fi
              git commit "$file" -m "$file"
            done
            git push origin main
          fi

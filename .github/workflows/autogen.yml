name: Generate m3u8 Files

on:
  push:
    paths:
      - "channels.json"
      - "generate.py"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo with full history
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Important for git reset

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with remote
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Run generate.py
        run: python generate.py

      - name: Commit and push m3u8 files
        run: |
          changes=$(git status --porcelain *.m3u8 | wc -l)
          if [ "$changes" -gt 0 ]; then
            for file in *.m3u8; do
              if git diff --quiet "$file"; then continue; fi
              git add "$file"
              git commit -m "$file"
            done
            git push origin main
          else
            echo "No .m3u8 changes to commit"

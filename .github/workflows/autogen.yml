name: Generate m3u8 Files

on:
  push:
    paths:
      - "channels.json"
      - "generate.py"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Make sure you have the full history

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with origin/main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Run Generator Script
        run: python generate.py

      - name: Commit and Push Each .m3u8 File Individually
        run: |
          changed=false
          for file in *.m3u8; do
            git add "$file"
            if ! git diff --cached --quiet "$file"; then
              git commit -m "$file"
              changed=true
            fi
          done

          if [ "$changed" = true ]; then
            git push origin main
          else
            echo "No .m3u8 file changes to push."
          fi

name: Generate m3u8 Files

on:
  push:
    paths:
      - "channels.json"
      - "generate.py"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full repo history
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest from remote main
        run: |
          git fetch origin
          git reset --hard origin/main

      - name: Run Generator Script
        run: python generate.py

      - name: Commit and Push Zee Channels Only
        run: |
          shopt -s nullglob
          zee_files=(zee_*.m3u8)
          if [ ${#zee_files[@]} -eq 0 ]; then
            echo "No Zee channel files to commit."
            exit 0
          fi
          
          git add "${zee_files[@]}"
          for file in "${zee_files[@]}"; do
            if git diff --cached --quiet "$file"; then continue; fi
            git commit "$file" -m "$file"
          done
          git push origin main
